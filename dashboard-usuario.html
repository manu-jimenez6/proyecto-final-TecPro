<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Despues de aca coloco mis css -->
    <link href="css/estilos.css" rel="stylesheet">
</head>
<body class="dashboard">
    <div class="decoracion-fondo"></div>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center ms-5 fs-4 fw-bold" href="#">
                <img src="icon/gestion_usuarios.png" alt="Logo" width="50" height="50" class="d-inline-block align-text-top me-4">
                Sistema de gestión de usuarios
            </a>
    
            <div class="d-flex gap-2 ms-auto">
                <button class="btn btn-nav d-flex align-items-center fw-bold"
                    id="btn-editar-perfil"
                    data-bs-toggle="modal"
                    data-bs-target="#modalPerfil">
                    <i class="bi bi-person-circle fs-4 me-2"></i>
                    Profile
                </button>

                <button id="btn-cerrar-sesion" class="btn btn-nav d-flex align-items-center fw-bold">
                    <i class="bi bi-box-arrow-right fs-4 me-2"></i>
                    Cerrar sesión
                </button>
            </div>
        </div>
    </nav>


    <main class="container mt-4">

        <!-- Mensaje de bienvenida -->
        <div class="row mb-4">
            <div class="col">
                <div class="card">
                    <div class="card-body p-5 text-center">
                        <h1>Bienvenida, Alejandra</h1>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cards de resumen -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body p-5">
                        <i class="bi bi-calendar-heart-fill fs-4"></i>
                        <h6 class="text-muted">Fecha de registro</h6>
                        <h4>01/06/2026</h4>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body p-5">
                        <i class="bi bi-clock-fill fs-4"></i>
                        <h6 class="text-muted">Ultimo acceso: </h6>
                        <h4>18:10</h4>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body p-5">
                        <i class="bi bi-person-check-fill fs-4"></i>
                        <h6 class="text-muted">Estado: </h6>
                        <h4>Activo</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- Informacion de la cuenta -->
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-body p-5">
                        <div class="d-flex align-items-center gap-2 mb-4">
                            <i class="bi bi-info-circle-fill fs-4"></i>
                            <h2 class="m-0">Información de la cuenta</h2>
                        </div>
                        <div class="row mb-3">
                            <div class="col-4">
                                <strong>Nombre: </strong>
                            </div>

                            <div class="col-8">
                                Alejandra Ramírez
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-4">
                                <strong>Correo electronico:</strong>
                            </div>

                            <div class="col-8">
                                maria.ramirez41@udea.edu.co
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-4">
                                <strong>Rol:</strong>
                            </div>

                            <div class="col-8">
                                Usuario
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Despues de aca coloco mis js-->

</body>
</html>
