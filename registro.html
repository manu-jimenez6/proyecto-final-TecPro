<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuarios</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Despues de aca coloco mis css -->
    <link href="css/estilos.css" rel="stylesheet">
</head>
<body>

    <div class="decoracion-fondo"></div>
    <div class="fondo-principal">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="contenedor shadow">

                <div class="card-body p-5 text-center">                                                         

                    <div class="icono-login">
                        <img src="icon/registro.png" alt="Usuario">
                    </div>

                    <h1 class="titulo-login mb-5">Registrate</h1>
                
                    <form id="form-registro"> 
                        <div class="input-group mb-3">
                            <span class="input-group-text">
                                <i class="bi bi-file-earmark-person-fill fs-4"></i>
                            </span>

                            <input
                                type="text"
                                id="nombre-registro"
                                class="form-control"
                                placeholder="Nombre">
                        </div>
                        
                        <div class="input-group mb-3">
                            <span class="input-group-text">
                                <i class="bi bi-envelope-heart-fill fs-4"></i>
                            </span>

                            <input
                                type="email"
                                id="email-registro"
                                class="form-control"
                                placeholder="Correo electrónico">
                        </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill fs-4"></i>
                            </span>

                            <input
                                type="password"
                                id="contrasena-registro"
                                class="form-control"
                                placeholder="Contraseña">
                        </div>

                        <button class="btn btn-form" id="btn-registro">
                            Registrate
                        </button>

                        <p class="text-center mt-3 text-muted">
                            ¿Ya tienes cuenta?
                            <a href="index.html" class="text-decoration-none">
                                Inicia sesión
                            </a>
                        </p>
                    </form>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </div>
    <script src="js/registro.js"></script>
</body>
</html>
